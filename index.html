    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background-color 0.3s, color 0.3s;
      background-attachment: fixed;
    }

    .light {
      background-image:
        radial-gradient(circle at 100% 0%, rgba(47, 174, 102, 0.10), transparent 38%),
        radial-gradient(circle at 0% 100%, rgba(15, 23, 42, 0.06), transparent 30%);
    }

    .dark {
      background-image:
        radial-gradient(circle at 10% 0%, rgba(47, 174, 102, 0.17), transparent 32%),
        radial-gradient(circle at 100% 100%, rgba(148, 163, 184, 0.12), transparent 24%);
    }

    .brand-mark {
      font-family: 'Sora', sans-serif;
    }

    .app-shell .hero-card {
      border-radius: 28px;
      overflow: hidden;
      position: relative;
    }

    .app-shell .hero-card::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(47, 174, 102, 0.75), transparent);
    }

    .app-shell table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    .app-shell table thead th {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-bottom: 10px;
    }

    .app-shell table td,
    .app-shell table th {
      padding: 12px 14px;
    }

    .app-shell table tbody tr td:first-child {
      border-top-left-radius: 14px;
      border-bottom-left-radius: 14px;
    }

    .app-shell table tbody tr td:last-child {
      border-top-right-radius: 14px;
      border-bottom-right-radius: 14px;
    }

    .light .app-shell table tbody tr {
      background: rgba(15, 23, 42, 0.035);
    }

    .dark .app-shell table tbody tr {
      background: rgba(148, 163, 184, 0.09);
    }

    .app-shell input,
    .app-shell select,
    .app-shell textarea {
      border-radius: 16px !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    /* Custom Scrollbar for dark theme */
    .dark ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    .dark ::-webkit-scrollbar-thumb {
        background-color: #2FAE66; /* Brand Green */
        border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
        background-color: #278F53; /* Brand Green Dark */
    }
    .dark ::-webkit-scrollbar-track {
        background-color: #020617; /* Slate 950 */
    }

    /* Custom Scrollbar for light theme */
    .light ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    .light ::-webkit-scrollbar-thumb {
        background-color: #94a3b8; /* Slate 400 */
        border-radius: 4px;
    }
    .light ::-webkit-scrollbar-thumb:hover {
        background-color: #64748b; /* Slate 500 */
    }
    .light ::-webkit-scrollbar-track {
        background-color: #f1f5f9; /* Slate 100 */
    }

    /* Base gradient for Dark Mode */
    .teamease-gradient-dark {
        background-image: radial-gradient(circle at top left, #0f172a 0%, #020617 60%, #022c22 100%);
    }

    /* Hero Card Style (Dark) - slate/emerald */
    .dark .hero-card {
        background: linear-gradient(135deg, #020617 0%, #1e293b 45%, #065f46 100%);
        border: 1px solid rgba(16, 185, 129, 0.45);
        box-shadow: 0 25px 45px -12px rgba(16, 185, 129, 0.25);

    /* Hero Card Style (Light) - slate/emerald */
    .light .hero-card {

        border: 1px solid #a7f3d0; /* Emerald 200 */
        box-shadow: 0 20px 40px -10px rgba(16, 185, 129, 0.22);
    }

    function useTheme() {
        // Default to LIGHT to match your requirement
        const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');

        useEffect(() => {
            // Apply root classes based on theme
            if (theme === 'dark') {
              document.body.className = `dark teamease-gradient-dark text-slate-100 min-h-screen`;
            } else {
              document.body.className = `light bg-slate-50 text-slate-900 min-h-screen`;
            }
            localStorage.setItem('theme', theme);
        }, [theme]);

        // We keep toggleTheme in case you want later, but not showing button now
        const toggleTheme = () => {
            setTheme(prev => prev === 'dark' ? 'light' : 'dark');
        };

        const isDark = theme === 'dark';
        
        // Teal / Cyan Glass Theme
        const colors = {
            // Backgrounds
            bgPrimary: isDark ? 'bg-slate-950/70 backdrop-blur-xl' : 'bg-slate-50',
            bgCard: isDark ? 'bg-slate-900/72 backdrop-blur-2xl ring-1 ring-white/10' : 'bg-white/75 backdrop-blur-2xl ring-1 ring-slate-200/70',
            accentBg: isDark ? 'bg-slate-800/55' : 'bg-white/70',
            inputBg: isDark ? 'bg-slate-950/65' : 'bg-white/90',

            // Text
            textPrimary: isDark ? 'text-slate-50' : 'text-slate-900',
            textSecondary: isDark ? 'text-slate-400' : 'text-slate-600',
            highlight: isDark ? 'text-[#8FDDB2]' : 'text-[#278F53]',
            
            // Borders & Shadows
            border: isDark ? 'border-[#2FAE66]/45' : 'border-slate-200',

            sidebarActive: isDark
              ? 'bg-[#2FAE66] text-white font-semibold shadow-lg shadow-[#2FAE66]/40'
              : 'bg-[#2FAE66] text-white font-semibold shadow-lg shadow-[#2FAE66]/25',
            sidebarHover: isDark ? 'hover:bg-slate-800/70' : 'hover:bg-slate-50',
        };

        return { theme, toggleTheme, isDark, colors };
    }

    function useAppStateProvider() {
      const [departments, setDepartments] = useState(initialData.departments);
      const [designations, setDesignations] = useState(initialData.designations);
      const [users, setUsers] = useState(initialData.users);
      const [attendance, setAttendance] = useState(initialData.attendance);
      const [leaves, setLeaves] = useState(initialData.leaves);
      const [documents, setDocuments] = useState(initialData.documents);
      const [notifications, setNotifications] = useState(initialData.notifications);

      // Load from localStorage
      useEffect(() => {
        try {
          const saved = localStorage.getItem("hrAppData");
          if (saved) {
            const data = JSON.parse(saved);
            if (data.departments) setDepartments(data.departments);
            if (data.designations) setDesignations(data.designations);
            if (data.users) setUsers(data.users);
            if (data.attendance) setAttendance(data.attendance);
            if (data.leaves) setLeaves(data.leaves);
            if (data.documents) setDocuments(data.documents);
            if (data.notifications) setNotifications(data.notifications);
          }
        } catch (e) {
          console.error("Failed to load saved data", e);
        }
      }, []);

      // Employees CRUD
      function addUser(user) {
        const id = Math.max(0, ...users.map((u) => u.id)) + 1;
        setUsers((s) => [...s, { ...user, id }]);
      }
      function updateUser(id, updates) {
        setUsers((s) => s.map((u) => (u.id === id ? { ...u, ...updates } : u)));
      }
      function deleteUser(id) {
        setUsers((s) => s.filter((u) => u.id !== id));
        setAttendance((a) => a.filter((att) => att.userId !== id));
        setLeaves((l) => l.filter((lv) => lv.userId !== id));
      }

      // Attendance
      function markAttendance({ userId, date, status }) {
        setAttendance((s) => {
          const without = s.filter((a) => !(a.userId === userId && a.date === date));
          return [...without, { userId, date, status }];
        });
      }

      // Leave requests
      function submitLeave(leave) {
        const id = Math.max(0, ...leaves.map((l) => l.id)) + 1;
        setLeaves((s) => [...s, { ...leave, id, status: "Pending" }]);
      }
      function updateLeave(id, updates) {
        setLeaves((s) => s.map((l) => (l.id === id ? { ...l, ...updates } : l)));
      }

      // Documents (not used but kept for completeness)
      function uploadDocument(doc) {
        const id = Math.max(0, ...documents.map((d) => d.id || 0)) + 1;
        const newDoc = { id, ...doc };
        setDocuments((s) => [...s, newDoc]);
        return newDoc;
      }

      // Notifications
      function addNotification({ title, message, audience = "all" }) {
        const id = Math.max(0, ...notifications.map((n) => n.id || 0)) + 1;
        const newNotification = {
          id,
          title,
          message,
          audience, // "all" | "hr" | "employees"
          createdAt: new Date().toISOString(),
          readBy: [],
        };
        setNotifications((s) => [newNotification, ...s]);
      }

      function markNotificationsReadForUser(userId) {
        setNotifications((s) =>
          s.map((n) =>
            n.readBy && n.readBy.includes(userId)
              ? n
              : { ...n, readBy: [...(n.readBy || []), userId] }
          )
        );
      }

      // NEW: reset all notifications
      function resetNotifications() {
        setNotifications([]);
      }

      // Save all data to localStorage
      useEffect(() => {
        const dataToSave = {
          departments,
          designations,
          users,
          attendance,
          leaves,
          documents,
          notifications,
        };
        try {

        } catch (e) {
          console.error("Failed to save data", e);
        }
      }, [departments, designations, users, attendance, leaves, documents, notifications]);

      return {

        setDesignations,
        users,
        addUser,
        updateUser,
        deleteUser,
        attendance,
        markAttendance,
        leaves,
        submitLeave,
        updateLeave,
        documents,
        uploadDocument,
        notifications,
        addNotification,
        markNotificationsReadForUser,
        resetNotifications,
      };
    }

        function DeptPieChart({ counts, total }) {

                let colorClass = 'bg-gray-400';
                if (dept === 'Engineering') colorClass = 'bg-[#2FAE66]';
                else if (dept === 'HR') colorClass = 'bg-[#2FAE66]';
                else if (dept === 'Sales') colorClass = 'bg-indigo-500';

                return { dept, count, percentage, colorClass };

      const selectableUsers = role === "hr" ? users : users.filter(u => u.id === currentUser.id);

      const [selectedUser, setSelectedUser] = useState(

      );

    function LeaveRequestsPage({ role, currentUser }) {

        type: "Casual",
        from: formatDate(),
        to: formatDate(),
        reason: "",
      });

        e.preventDefault();
        submitLeave({
          ...form,
          userId: currentUser.id,
          userName: currentUser.name,

        setForm({
          type: "Casual",

          to: formatDate(),
          reason: "",

        updateLeave(id, { status: "Approved", remark });

        const tax = Math.round((basic + hra + da + special) * 0.07);
        const professionalTax = 200;
        const gross = basic + hra + da + special;
        const deductions = pf + tax + professionalTax;
        const net = gross - deductions;
        return { basic, hra, da, special, pf, tax, professionalTax, gross, deductions, net };
      }

              </div>
            </div>
            <div className={`${colors.bgCard} min-h-[100dvh] md:min-h-0 flex flex-col justify-center p-5 sm:p-6 md:p-10 ${colors.textPrimary}`}>
              <div className="md:hidden flex items-center justify-between mb-4">
                <BIOURELogo size="2xl" />
                <span className="px-2 py-1 rounded-full bg-[#2FAE66]/10 text-[#278F53] text-[10px] border border-[#2FAE66]/30 uppercase tracking-widest">
                  People Ops
                </span>
              </div>
              <p className={`text-sm ${colors.textSecondary} mb-4 md:mb-6`}>
                Sign in to access your secure HR workspace.
              </p>

              <div className={`flex mb-4 md:mb-6 text-sm ${colors.accentBg} rounded-3xl p-1`}>
                <button
                  type="button"
                  onClick={() => switchMode("hr")}
                  className={`flex-1 py-2.5 rounded-2xl font-semibold transition ${
                    mode === "hr" ? "bg-[#2FAE66] text-white shadow-lg shadow-[#2FAE66]/40" : `${colors.textSecondary} ${colors.sidebarHover}`
                  }`}
                >
                  HR Manager
                </button>
                <button
                  type="button"
                  onClick={() => switchMode("employee")}
                  className={`flex-1 py-2.5 rounded-2xl font-semibold transition ${
                    mode === "employee"
                      ? "bg-[#2FAE66] text-white shadow-lg shadow-[#2FAE66]/40"
                      : `${colors.textSecondary} ${colors.sidebarHover}`
                  }`}
                >
                  Employee
                </button>
              </div>

              <form onSubmit={submit} className="space-y-4 md:space-y-5 text-sm">
                <div>
                  <label className={`block ${colors.textPrimary} text-xs mb-1 font-medium`}>Email Address</label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className={`w-full rounded-3xl ${colors.inputBg} border ${colors.border} px-4 py-2.5 md:py-3 focus:outline-none focus:ring-2 focus:ring-[#2FAE66] ${colors.textPrimary}`}
                    placeholder="Enter your email"
                    required
                  />
                </div>
                <div>
                  <label className={`block ${colors.textPrimary} text-xs mb-1 font-medium`}>
                    Password
                  </label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className={`w-full rounded-3xl ${colors.inputBg} border ${colors.border} px-4 py-2.5 md:py-3 focus:outline-none focus:ring-2 focus:ring-[#2FAE66] ${colors.textPrimary}`}
                    placeholder="••••••••"
                    required
                  />
                </div>
                <button
                  type="submit"
                  className="w-full mt-1 md:mt-2 py-2.5 md:py-3 rounded-3xl bg-[#2FAE66] hover:bg-[#278F53] text-white font-bold text-sm md:text-base shadow-xl shadow-[#2FAE66]/40 transition duration-300"
                >
                  Sign In
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // ---------- Main HR App ----------
    function HRManagerApp({ role, onLogout }) {
      const app = useAppStateProvider();
      const { colors } = useContext(ThemeContext);
      const [active, setActive] = useState(
        "dashboard" // Set default view to Dashboard
      );
      const [mobileOpen, setMobileOpen] = useState(false);

      const currentUser =
        app.users.find((u) => u.role === role) ||
        app.users[0] || { id: 0, name: "Guest", role: "employee" };

      function handleLogout() {
        if (onLogout) onLogout();
      }

      function openNotifications() {
        setActive("notifications");
      }

      return (
        <AppContext.Provider value={{ ...app }}>
          <div className="min-h-screen app-shell">
            <Sidebar
              active={active}
              setActive={setActive}
              role={role}
              isMobileOpen={mobileOpen}
              setIsMobileOpen={setMobileOpen}
            />
            <div className={`min-h-screen ${colors.bgPrimary} pb-12 md:pb-16 pt-0 md:pt-20`}>
              <Navbar
                role={role}
                onLogout={handleLogout}
                currentUser={currentUser}
                notifications={app.notifications}
                onOpenNotifications={openNotifications}
                setIsMobileOpen={setMobileOpen}
              />
              <main className="pt-6 max-w-7xl mx-auto px-4 md:px-6">
                {/* NEW: Dashboard Page Route */}
                {active === "dashboard" && <DashboardPage role={role} />}
                {active === "employees" && role === "hr" && <EmployeesPage />}
                {active === "attendance" && (
                  <AttendancePage role={role} currentUser={currentUser} />
                )}
                {active === "leaves" && (
                  <LeaveRequestsPage role={role} currentUser={currentUser} />
                )}
                {active === "payroll" && (
                  <PayrollPage role={role} currentUser={currentUser} />
                )}
                {active === "notifications" && (
                  <NotificationsPage role={role} currentUser={currentUser} />
                )}
              </main>
            </div>
          </div>
        </AppContext.Provider>
      );
    }

    // ---------- Root App (Login + Main) ----------
    function RootApp() {
      const themeProps = useTheme();
      const app = useAppStateProvider(); 
      const [user, setUser] = useState(null); 

      function handleLogin({ email, password }) {
        if (email === "hr@bioure.com" && password === "hr2026") {
          setUser({ role: "hr", email });
        } else if (email === "employee@bioure.com" && password === "emp2026") {
          setUser({ role: "employee", email });
        } else {
          alert("Invalid credentials. Use the demo logins shown.");
        }
      }

      function handleLogout() {
        setUser(null);
      }

      useEffect(() => {
          try {
              const session = localStorage.getItem('hrAppSession');
              if (session) {
                  setUser(JSON.parse(session));
              }
          } catch (e) {
              console.error("Failed to load session", e);
          }
      }, []);

      useEffect(() => {
          if (user) {
              localStorage.setItem('hrAppSession', JSON.stringify(user));
          } else {
              localStorage.removeItem('hrAppSession');
          }
      }, [user]);

      return (
        <ThemeContext.Provider value={themeProps}>
            <AppContext.Provider value={{ ...app }}>
                {user ? <HRManagerApp role={user.role} onLogout={handleLogout} /> : <LoginScreen onLogin={handleLogin} />}
            </AppContext.Provider>
        </ThemeContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RootApp />);
  </script>
</body>
</html>
